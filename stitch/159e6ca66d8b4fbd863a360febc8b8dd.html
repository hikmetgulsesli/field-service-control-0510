<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Error - ServiceControl</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#233144",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#191b23",
                        "secondary-fixed-dim": "#b9c7df",
                        "on-tertiary": "#581e00",
                        "surface-container-lowest": "#0c0e16",
                        "surface": "#11131b",
                        "tertiary": "#ffb596",
                        "secondary-container": "#3c4a5e",
                        "secondary": "#b9c7df",
                        "surface-variant": "#32343d",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-primary-container": "#eeefff",
                        "surface-tint": "#b4c5ff",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-dim": "#11131b",
                        "inverse-on-surface": "#2e3039",
                        "tertiary-container": "#bc4800",
                        "on-surface": "#e1e2ed",
                        "surface-container-high": "#282a32",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#360f00",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary": "#002a78",
                        "inverse-primary": "#0053db",
                        "on-surface-variant": "#c3c6d7",
                        "on-error": "#690005",
                        "on-tertiary-container": "#ffede6",
                        "background": "#11131b",
                        "primary-container": "#2563eb",
                        "surface-container": "#1d1f27",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-container": "#abb9d1",
                        "primary": "#b4c5ff",
                        "outline-variant": "#434655",
                        "error-container": "#93000a",
                        "surface-bright": "#373942",
                        "tertiary-fixed": "#ffdbcd",
                        "on-primary-fixed": "#00174b",
                        "on-background": "#e1e2ed",
                        "secondary-fixed": "#d5e3fc",
                        "on-secondary-fixed": "#0d1c2e",
                        "inverse-surface": "#e1e2ed",
                        "outline": "#8d90a0",
                        "surface-container-highest": "#32343d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "xs": "4px",
                        "sm": "8px",
                        "gutter": "16px",
                        "xl": "32px",
                        "unit": "4px",
                        "lg": "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "mono-data": ["system-ui"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "mono-data": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-gutter selection:bg-primary-container selection:text-on-primary-container">
<!-- Error Canvas Container -->
<main class="w-full max-w-[480px]">
<!-- Surface Card for Error State -->
<div class="bg-surface-container border border-surface-variant rounded-xl p-xl flex flex-col items-center text-center shadow-[0px_4px_12px_rgba(0,0,0,0.5)]">
<!-- Alert Icon Container -->
<div class="w-16 h-16 rounded-full bg-error-container flex items-center justify-center mb-lg ring-4 ring-background">
<span class="material-symbols-outlined text-[32px] text-on-error-container" style="font-variation-settings: 'FILL' 1;">
                    error
                </span>
</div>
<!-- Error Messaging -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">
                Failed to load data
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-sm">
                A critical storage or runtime error has prevented the application from retrieving the necessary operational data. 
            </p>
<!-- Action Group -->
<div class="flex flex-col w-full sm:flex-row items-center justify-center gap-md">
<!-- Secondary Action -->
<button class="w-full sm:w-auto px-lg py-[10px] rounded-lg border border-outline-variant bg-transparent text-on-surface font-label-md text-label-md hover:bg-surface-container-high transition-colors focus:ring-2 focus:ring-primary-container focus:outline-none focus:ring-offset-2 focus:ring-offset-background">
                    Clear Storage &amp; Reset
                </button>
<!-- Primary Action -->
<button class="w-full sm:w-auto px-lg py-[10px] rounded-lg bg-primary-container text-on-primary-container font-label-md text-label-md hover:bg-inverse-primary transition-colors focus:ring-2 focus:ring-primary-container focus:outline-none focus:ring-offset-2 focus:ring-offset-background flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[18px]">refresh</span>
                    Retry
                </button>
</div>
<!-- Technical Detail Toggle (Optional standard UX pattern for corporate errors) -->
<div class="mt-lg pt-lg border-t border-surface-variant w-full">
<p class="font-mono-data text-mono-data text-outline flex items-center justify-center gap-xs cursor-not-allowed">
<span class="material-symbols-outlined text-[14px]">terminal</span>
                    ERR_STORAGE_TIMEOUT_0x9B
                </p>
</div>
</div>
</main>
</body></html>
